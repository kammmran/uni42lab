<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - Uni42Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/main.css">
    <link rel="stylesheet" href="static/css/core/news.css">
</head>
<body>
    <header class="header" id="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="static/images/logo.png" alt="Uni42Tech Logo">
                <span class="logo-text">Uni42Lab</span>
            </a>
            <div class="header-right">
                <nav class="main-nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="tools.html" class="nav-link">Tools</a>
                    <a href="publications.html" class="nav-link">Publications</a>
                    <a href="news.html" class="nav-link">News</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="news-section">
            <div class="news-container">
                <div class="news-slideshow">
                    <p class="no-news">Coming soon...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Uni42Lab. All rights reserved.</p>
        </div>
    </footer>

    <script>
    let currentSlideIndex = 0;
    const slides = document.querySelectorAll('.news-slide');
    const dots = document.querySelectorAll('.dot');
    const slidesWrapper = document.querySelector('.slides-wrapper');
    let autoSlideInterval;

    function showSlide(index) {
        dots.forEach(dot => dot.classList.remove('active'));
        
        if (index >= slides.length) currentSlideIndex = 0;
        if (index < 0) currentSlideIndex = slides.length - 1;
        
        // Apply smooth sliding animation
        const translateX = -currentSlideIndex * 100;
        slidesWrapper.style.transform = `translateX(${translateX}%)`;
        
        dots[currentSlideIndex].classList.add('active');
    }

    function changeSlide(direction) {
        currentSlideIndex += direction;
        showSlide(currentSlideIndex);
        resetAutoSlide();
    }

    function currentSlide(index) {
        currentSlideIndex = index - 1;
        showSlide(currentSlideIndex);
        resetAutoSlide();
    }

    function nextSlide() {
        currentSlideIndex++;
        showSlide(currentSlideIndex);
    }

    function startAutoSlide() {
        autoSlideInterval = setInterval(nextSlide, 5000);
    }

    function resetAutoSlide() {
        clearInterval(autoSlideInterval);
        startAutoSlide();
    }

    // Start auto-slide when page loads
    document.addEventListener('DOMContentLoaded', function() {
        if (slides.length > 1) {
            startAutoSlide();
        }
    });
    </script>
    <script src="static/js/mobile-nav.js"></script>

</body>
</html>
